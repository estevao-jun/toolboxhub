<!DOCTYPE html>
<html>

<head>

<title>Advanced Password Generator - ToolBoxHub</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1 style="text-align:center">Advanced Password Generator</h1>

<div style="text-align:center">

<label>Password Length</label>

<br>

<input type="number" id="length" value="12">

<br><br>

<label>
<input type="checkbox" id="numbers" checked>
Include Numbers
</label>

<br>

<label>
<input type="checkbox" id="symbols" checked>
Include Symbols
</label>

<br><br>

<button onclick="generatePassword()">Generate Password</button>

<p id="result"></p>

</div>

<script>

function generatePassword(){

let length = document.getElementById("length").value

let useNumbers = document.getElementById("numbers").checked
let useSymbols = document.getElementById("symbols").checked

let letters = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ"
let numbers = "0123456789"
let symbols = "!@#$%^&*()"

let chars = letters

if(useNumbers){

chars += numbers

}

if(useSymbols){

chars += symbols

}

let password = ""

for(let i=0;i<length;i++){

password += chars[Math.floor(Math.random()*chars.length)]

}

document.getElementById("result").innerText = password

}

</script>

</body>

</html>
