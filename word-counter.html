<!DOCTYPE html>
<html>

<head>

<title>Free Online Word Counter Tool – ToolBoxHub</title>

<h1>Free Online Word Counter Tool</h1>

<p>
Use this free online word counter to count words and characters instantly. It is perfect for essays, assignments, and blog posts.
</p>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1 style="text-align:center">Word Counter</h1>

<div style="text-align:center">

<textarea id="text" rows="10" cols="50" placeholder="Type or paste text..."></textarea>

<p id="result"></p>

</div>

<script>

let text = document.getElementById("text")

let result = document.getElementById("result")

text.addEventListener("input",function(){

let words = text.value.trim().split(/\s+/).filter(Boolean)

let characters = text.value.length

result.innerHTML = "Words: " + words.length + " | Characters: " + characters

})

</script>

</body>

</html>
