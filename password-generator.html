<!DOCTYPE html>
<html>

<head>

<title>Strong Password Generator | ToolBoxHub</title>
<h1>Password Generator</h1>
<p>Create secure, random passwords instantly with our free password generator. Protect your accounts with strong, unique passwords.</p>


<link rel="stylesheet" href="style.css">

</head>

<body>

<h1 style="text-align:center">Password Generator</h1>

<div style="text-align:center">

<input id="length" type="number" placeholder="Password length" value="12">

<br><br>

<button onclick="generatePassword()">Generate Password</button>

<p id="password"></p>

</div>

<script>

function generatePassword(){

let length = document.getElementById("length").value

let chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%"

let password = ""

for(let i=0;i<length;i++){

password += chars[Math.floor(Math.random()*chars.length)]

}

document.getElementById("password").innerText = password

}

</script>

</body>

</html>
